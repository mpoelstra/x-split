<div class="purchase-shell">
  <div class="crumbs">Purchases <span>›</span> Edit Purchase</div>
  <header class="topbar">
    <div class="left">
      <button type="button" class="back" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="titles">
        <h1>Edit Expense</h1>
        <p>
          @if (currentBill(); as bill) {
            Bill: {{ bill.title }} · with {{ bill.friendName }}
          } @else {
            Update game details and split info.
          }
        </p>
      </div>
    </div>
  </header>

  <main class="body">
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-card">
      <div class="field">
        <label>Game Title</label>
        <input
          type="text"
          formControlName="gameTitle"
          placeholder="Enter game title"
          (input)="onGameTitleInput($event)"
        />
      </div>

      <div class="field">
        <label>TrueAchievements URL</label>
        <div class="ta-url-row">
          <input
            type="url"
            formControlName="trueAchievementsUrl"
            placeholder="https://www.trueachievements.com/game/..."
            (input)="onTrueAchievementsUrlInput($event)"
          />
          <div class="ta-url-actions">
            <button type="button" class="auto-link" (click)="resetTrueAchievementsUrlAuto()">Auto</button>
            <button
              type="button"
              class="visit-link"
              [disabled]="!form.controls.trueAchievementsUrl.value.trim()"
              (click)="openTrueAchievementsUrl()"
            >
              Visit
            </button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Share with</label>
        @if (currentBill(); as bill) {
          <div class="chips">
            <span class="chip active"><i></i>{{ bill.friendName }}</span>
          </div>
        } @else {
          <div class="chips">
            <span class="chip">No bill selected</span>
          </div>
        }
      </div>

      <div class="grid-two">
        <div class="field">
          <label>Price (EUR)</label>
          <div class="input-wrap">
            <span class="money">€</span>
            <input type="text" formControlName="amount" inputmode="decimal" placeholder="0.00" />
          </div>
          <small class="field-error" [class.visible]="!!amountErrorMessage()">
            {{ amountErrorMessage() || ' ' }}
          </small>
        </div>

        <div class="field">
          <label>Who Paid?</label>
          <select formControlName="paidByMemberId">
            @for (member of memberOptions(); track member.id) {
              <option [value]="member.id">{{ member.displayName }}</option>
            }
          </select>
        </div>
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" formControlName="expenseDate" />
      </div>

      <button type="submit" class="submit" [disabled]="submitting()">
        <span class="material-symbols-outlined">save</span>
        Save Changes
      </button>
    </form>
  </main>
</div>
