<div class="login-shell">
  <header class="top-nav">
    <div class="brand">
      <span class="material-symbols-outlined">sports_esports</span>
      <h2>X-Split</h2>
    </div>
    <div class="auth-cta">
      <span>Private beta</span>
    </div>
  </header>

  <main class="content">
    <div class="grid-bg"></div>
    <div class="blob blob-left"></div>
    <div class="blob blob-right"></div>

    <section class="login-card">
      <div class="hero">
        <span class="material-symbols-outlined">videogame_asset</span>
      </div>

      <div class="intro">
        <h1>Welcome back</h1>
        <p>The ultimate toolkit for gamers and creators</p>
      </div>

      @if (authBypass) {
        <button type="button" class="sso" (click)="continueStub()">
          <span class="material-symbols-outlined">play_circle</span>
          Continue in local stub mode
        </button>
      } @else {
        <button type="button" class="sso" (click)="signIn()">
          <span class="google-dot"></span>
          Sign in with Google
        </button>
      }
      <p class="terms">Sign in with Google to access your shared bills and expenses.</p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 X-Split. All rights reserved.</p>
  </footer>
</div>
